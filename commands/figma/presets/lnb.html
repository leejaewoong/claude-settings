<!-- LNB Only 프리셋 — 1920×162px -->
<!-- Figma 참조: 공통-PUBG-UI-Kit#5608:60178 -->
<!-- 동적 마커: {{HEADER_TEXT}}, {{LNB_TABS}}, {{ACTIVE_LNB_TAB}} -->

<style>
  /* ===== LNB Only 프리셋 스타일 ===== */
  .lnb-only-wrapper {
    width: 1920px;
    height: 162px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PUBG Body', sans-serif;
    background: #1a1a22;
    position: relative;
  }

  /* 헤더 텍스트 영역 (~120px) */
  .lnb-header-text {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .lnb-header-text h1 {
    font-size: 32px;
    font-weight: 700;
    color: #eaeaea;
    letter-spacing: 2px;
    text-align: center;
    margin: 0;
  }

  /* 서브탭 영역 (~42px) — 중앙 absolute 배치 (gnb.html .lnb-center 동일 패턴) */
  .lnb-subtabs {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 1px; /* 구분선(1px) 위 */
    height: 42px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .lnb-only-key {
    width: 26px;
    height: 26px;
    border: 1px solid #555;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #8b8b8b;
    margin: 0 12px;
    background: rgba(255,255,255,0.05);
    font-family: 'PUBG Body', sans-serif;
  }
  .lnb-only-tab {
    padding: 0 24px;
    height: 42px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    color: #8b8b8b;
    letter-spacing: 0.3px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'PUBG Body', sans-serif;
  }
  .lnb-only-tab.active {
    color: #eaeaea;
    font-weight: 600;
  }

  /* 하단 구분선 */
  .lnb-only-divider {
    width: 1920px;
    height: 1px;
    background: rgba(255,255,255,0.06);
    position: absolute;
    bottom: 0;
  }
</style>

<div class="lnb-only-wrapper">
  <!-- 헤더 텍스트 -->
  <div class="lnb-header-text">
    <h1 id="header-text">{{HEADER_TEXT}}</h1>
  </div>

  <!-- 서브탭 -->
  <nav class="lnb-subtabs" id="lnb-only-tabs">
    <div class="lnb-only-key">A</div>
    <!-- {{LNB_TABS}} 마커로 동적 생성 -->
    <div class="lnb-only-tab" data-tab="LNB1">탭</div>
    <div class="lnb-only-tab" data-tab="LNB2">탭</div>
    <div class="lnb-only-tab" data-tab="LNB3">탭</div>
    <div class="lnb-only-tab" data-tab="LNB4">탭</div>
    <div class="lnb-only-tab" data-tab="LNB5">탭</div>
    <div class="lnb-only-key">D</div>
  </nav>

  <div class="lnb-only-divider"></div>
</div>

<script>
(function() {
  var activeLnbTab = '{{ACTIVE_LNB_TAB}}';

  // LNB 활성 탭 설정
  document.querySelectorAll('.lnb-only-tab').forEach(function(tab) {
    if (tab.dataset.tab === activeLnbTab.toUpperCase() || tab.textContent.trim() === activeLnbTab) {
      tab.classList.add('active');
    }
  });
})();
</script>
